<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Vowena Docs, the canonical reference for the Vowena protocol, SDK, and dashboard">
  <title>Vowena Docs</title>
  <desc>The canonical reference for the Vowena protocol, SDK, and dashboard.</desc>

  <defs>
    <!-- Background gradient: deep violet, reads on both GitHub themes -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F16"/>
      <stop offset="55%" stop-color="#160F3A"/>
      <stop offset="100%" stop-color="#1A0F52"/>
    </linearGradient>

    <!-- Soft violet glow behind the loop symbol -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6B4EFF" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6B4EFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6B4EFF" stop-opacity="0"/>
    </radialGradient>

    <!-- 24px dot grid -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" fill-opacity="0.045"/>
    </pattern>

    <!-- Subtle vignette to push the corners back -->
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="65%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>

    <!-- Page surface gradients: layered stacked panels suggesting docs sections -->
    <linearGradient id="pageFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F1A3C" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#14101F" stop-opacity="0.92"/>
    </linearGradient>

    <linearGradient id="pageMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1530" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#100C20" stop-opacity="0.62"/>
    </linearGradient>

    <linearGradient id="pageBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16122B" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0E0A1B" stop-opacity="0.42"/>
    </linearGradient>

    <!-- Right-edge vertical fade to soften the page stack into the bg -->
    <linearGradient id="pageFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F0F16" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0F0F16" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Code block surface -->
    <linearGradient id="codeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B0717" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#0A0614" stop-opacity="0.94"/>
    </linearGradient>
  </defs>

  <!-- Base layers -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#dots)"/>
  <rect width="1280" height="320" fill="url(#vignette)"/>

  <!-- Hairline border (top + bottom) -->
  <line x1="0" y1="0.5" x2="1280" y2="0.5" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <line x1="0" y1="319.5" x2="1280" y2="319.5" stroke="#FFFFFF" stroke-opacity="0.06"/>

  <!-- Soft accent glow behind the symbol -->
  <circle cx="170" cy="160" r="180" fill="url(#glow)"/>

  <!-- Logo: flowing loop, scaled to 160px from the 80-unit canonical viewBox -->
  <g transform="translate(90 80) scale(2)">
    <path d="M44 18C44 18 28 22 24 40C20 58 36 62 36 62" stroke="#6B4EFF" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M36 62C36 62 52 58 56 40C60 22 44 18 44 18" stroke="#6B4EFF" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.4"/>
    <circle cx="40" cy="40" r="3" fill="#6B4EFF"/>
  </g>

  <!-- Wordmark + meta -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'DM Sans', sans-serif">
    <!-- DOCS eyebrow label -->
    <text x="288" y="138"
          font-size="11"
          font-weight="600"
          fill="#B5A8FF"
          letter-spacing="2"
          text-rendering="geometricPrecision">DOCS</text>

    <!-- vowena wordmark -->
    <text x="286" y="200"
          font-size="84"
          font-weight="600"
          fill="#F4F4F5"
          letter-spacing="-2.5"
          text-rendering="geometricPrecision">vowena</text>

    <!-- Tagline -->
    <text x="289" y="238"
          font-size="17"
          font-weight="400"
          fill="#B0ADBF"
          letter-spacing="-0.2"
          text-rendering="geometricPrecision">The canonical reference for the Vowena protocol, SDK, and dashboard.</text>

    <!-- Footer meta row: monospace, far-left -->
    <g font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Space Mono', monospace"
       font-size="11"
       fill="#807C90"
       letter-spacing="0.6">
      <text x="288" y="272">MINTLIFY  ·  MDX  ·  CC BY 4.0</text>
    </g>
  </g>

  <!-- Right side: layered stacked docs panels with text-line silhouette -->
  <g transform="translate(880 44)">

    <!-- Backmost panel, slight rotation -->
    <g transform="translate(150 22) rotate(6)">
      <rect width="170" height="232" rx="10" fill="url(#pageBack)" stroke="#6B4EFF" stroke-opacity="0.18" stroke-width="1"/>
      <!-- Eyebrow chip -->
      <rect x="18" y="20" width="36" height="10" rx="2.5" fill="#6B4EFF" fill-opacity="0.14"/>
      <!-- Heading lines -->
      <rect x="18" y="42" width="120" height="6" rx="2" fill="#FFFFFF" fill-opacity="0.18"/>
      <rect x="18" y="54" width="92"  height="6" rx="2" fill="#FFFFFF" fill-opacity="0.12"/>
    </g>

    <!-- Middle panel -->
    <g transform="translate(80 12) rotate(2.5)">
      <rect width="180" height="240" rx="10" fill="url(#pageMid)" stroke="#6B4EFF" stroke-opacity="0.28" stroke-width="1"/>
      <!-- Eyebrow chip -->
      <rect x="20" y="22" width="42" height="12" rx="2.5" fill="#6B4EFF" fill-opacity="0.18"/>
      <!-- Heading -->
      <rect x="20" y="46" width="130" height="8" rx="2.5" fill="#FFFFFF" fill-opacity="0.45"/>
      <rect x="20" y="60" width="100" height="8" rx="2.5" fill="#FFFFFF" fill-opacity="0.28"/>
      <!-- Body lines -->
      <rect x="20" y="86"  width="140" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.10"/>
      <rect x="20" y="98"  width="120" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.10"/>
      <rect x="20" y="110" width="135" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.10"/>
      <rect x="20" y="122" width="80"  height="4" rx="2" fill="#FFFFFF" fill-opacity="0.10"/>
    </g>

    <!-- Front panel (most prominent: the reader's current page) -->
    <g transform="translate(0 0)">
      <rect width="210" height="252" rx="12" fill="url(#pageFront)" stroke="#6B4EFF" stroke-opacity="0.45" stroke-width="1"/>

      <!-- Eyebrow chip + section label -->
      <rect x="22" y="24" width="58" height="16" rx="3" fill="#6B4EFF" fill-opacity="0.20"/>
      <text x="30" y="35"
            font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'DM Sans', sans-serif"
            font-size="8"
            font-weight="600"
            fill="#B5A8FF"
            letter-spacing="1.4">PROTOCOL</text>

      <!-- Page heading lines -->
      <rect x="22" y="54" width="160" height="10" rx="3" fill="#F4F4F5" fill-opacity="0.94"/>
      <rect x="22" y="70" width="110" height="10" rx="3" fill="#F4F4F5" fill-opacity="0.62"/>

      <!-- Body text lines -->
      <rect x="22" y="100" width="166" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.20"/>
      <rect x="22" y="112" width="156" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.16"/>
      <rect x="22" y="124" width="164" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.16"/>
      <rect x="22" y="136" width="120" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.16"/>

      <!-- Code block, syntax-tinted bars -->
      <rect x="22" y="160" width="166" height="68" rx="6" fill="url(#codeBg)" stroke="#6B4EFF" stroke-opacity="0.22" stroke-width="1"/>
      <!-- Window dots -->
      <circle cx="32" cy="170" r="1.6" fill="#FF4D6A" fill-opacity="0.55"/>
      <circle cx="38" cy="170" r="1.6" fill="#FFBD2E" fill-opacity="0.55"/>
      <circle cx="44" cy="170" r="1.6" fill="#34EDAA" fill-opacity="0.55"/>
      <!-- Code lines -->
      <rect x="30" y="182" width="14" height="3" rx="1.5" fill="#B5A8FF" fill-opacity="0.85"/>
      <rect x="48" y="182" width="46" height="3" rx="1.5" fill="#34EDAA" fill-opacity="0.78"/>
      <rect x="98" y="182" width="22" height="3" rx="1.5" fill="#FFFFFF" fill-opacity="0.45"/>
      <rect x="30" y="192" width="60" height="3" rx="1.5" fill="#6B9FFF" fill-opacity="0.72"/>
      <rect x="94" y="192" width="36" height="3" rx="1.5" fill="#FFFFFF" fill-opacity="0.45"/>
      <rect x="30" y="202" width="22" height="3" rx="1.5" fill="#B5A8FF" fill-opacity="0.85"/>
      <rect x="56" y="202" width="64" height="3" rx="1.5" fill="#FFBD2E" fill-opacity="0.72"/>
      <rect x="30" y="212" width="84" height="3" rx="1.5" fill="#FFFFFF" fill-opacity="0.40"/>
      <rect x="30" y="222" width="50" height="3" rx="1.5" fill="#34EDAA" fill-opacity="0.78"/>
    </g>

    <!-- Tiny floating focal dots, echoing the loop mark -->
    <circle cx="262" cy="262" r="3" fill="#6B4EFF"/>
    <circle cx="262" cy="262" r="7" fill="none" stroke="#6B4EFF" stroke-opacity="0.35" stroke-width="1"/>
    <circle cx="-12" cy="18" r="2" fill="#B5A8FF" opacity="0.7"/>
  </g>

  <!-- Right-edge fade so pages dissolve into the background -->
  <rect x="1180" y="0" width="100" height="320" fill="url(#pageFade)"/>
</svg>
